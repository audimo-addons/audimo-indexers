name: release

# Build per-platform PyInstaller binaries and attach them to a release,
# alongside a manifest.json the Audimo desktop app's catalog runtime
# fetches at install time.
#
# Trigger by pushing a tag of the form `indexers-vX.Y.Z`, or run
# manually via workflow_dispatch (useful when re-publishing the same
# version with a fix).

on:
  push:
    tags:
      - 'indexers-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v)'
        required: true
        default: '0.17.0'

permissions:
  contents: write

jobs:
  smoke:
    name: import smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python -c "from server import app; print('routes:', len(app.routes))"
      - run: python -c "from clients import RDClient, AllDebridClient, TorBoxClient, PremiumizeClient, DebridLinkClient, EasyDebridClient"
      - run: python -c "from indexers import apibay, bitsearch, torrentdownload, prowlarr, rutracker, audiobookbay"

  build:
    needs: smoke
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # arm64
            target: darwin-arm64
            artifact: audimo-indexers-darwin-arm64
          # darwin-x64 (Intel Mac) intentionally omitted — macos-13
          # runners are capacity-constrained on free CI and Intel Macs
          # are a niche we don't have users for yet. Mirrors streamers.
          - os: ubuntu-latest
            target: linux-x64
            artifact: audimo-indexers-linux-x64
          - os: windows-latest
            target: win32-x64
            artifact: audimo-indexers-win32-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: pyinstaller audimo_indexers.spec --clean --noconfirm
      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv dist/audimo-indexers dist/${{ matrix.artifact }}
      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path dist\audimo-indexers.exe -NewName ${{ matrix.artifact }}
        shell: pwsh
      - name: Compute SHA256 (Unix)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 dist/${{ matrix.artifact }} | awk '{print $1}' > dist/${{ matrix.artifact }}.sha256
      - name: Compute SHA256 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -Path "dist\${{ matrix.artifact }}").Hash.ToLower()
          $hash | Out-File -Encoding ascii -NoNewline "dist\${{ matrix.artifact }}.sha256"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve version + flatten artifacts
        id: meta
        run: |
          set -euo pipefail
          REF="${GITHUB_REF##*/}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${REF#indexers-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p out
          # actions/download-artifact v4 puts each artifact in its own
          # subdir — flatten so we can iterate uniformly below.
          find artifacts -mindepth 2 -type f -exec cp {} out/ \;
          ls -la out/
      - name: Build manifest.json
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/indexers-v${VERSION}"
          read_sha() { cat "out/${1}.sha256"; }
          cat > out/manifest.json <<EOF
          {
            "schema_version": 1,
            "id": "audimo-indexers",
            "name": "Audimo Indexers",
            "version": "${VERSION}",
            "min_audimo_version": "0.1.0",
            "description": "Six indexers (apibay, bitsearch, torrentdownload, prowlarr, rutracker, audiobookbay) feeding into six debrid backends (Real-Debrid, AllDebrid, TorBox, Premiumize, Debrid-Link, EasyDebrid). RTN-style ranking, BEP-15 verify, peer injection into the bundled streaming sidecar.",
            "capabilities": [
              "resolve.sources",
              "resolve.sources.stream",
              "resolve.stream",
              "cache.resolve",
              "search.books"
            ],
            "binaries": {
              "darwin-arm64": {
                "url": "${BASE}/audimo-indexers-darwin-arm64",
                "sha256": "$(read_sha audimo-indexers-darwin-arm64)"
              },
              "linux-x64": {
                "url": "${BASE}/audimo-indexers-linux-x64",
                "sha256": "$(read_sha audimo-indexers-linux-x64)"
              },
              "win32-x64": {
                "url": "${BASE}/audimo-indexers-win32-x64.exe",
                "sha256": "$(read_sha audimo-indexers-win32-x64.exe)"
              }
            },
            "default_settings": {
              "src_apibay_enabled": true,
              "src_bitsearch_enabled": true,
              "src_torrentdownload_enabled": true,
              "src_prowlarr_enabled": false,
              "src_rutracker_enabled": false,
              "src_audiobookbay_enabled": true,
              "verify_torrents": true
            }
          }
          EOF
          cat out/manifest.json
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: indexers-v${{ steps.meta.outputs.version }}
          name: Indexers v${{ steps.meta.outputs.version }}
          files: |
            out/audimo-indexers-darwin-arm64
            out/audimo-indexers-darwin-arm64.sha256
            out/audimo-indexers-linux-x64
            out/audimo-indexers-linux-x64.sha256
            out/audimo-indexers-win32-x64.exe
            out/audimo-indexers-win32-x64.exe.sha256
            out/manifest.json
          fail_on_unmatched_files: true
